# Target board: Waveshare ESP32-C6-Zero
#
# Standalone ambient light sensor node (BH1750 only) - a separate physical
# device from the garden-weather-sensor-waveshare BME280 unit, not sharing
# an enclosure or power path with it.
#
# I2C pins (GPIO18 SDA / GPIO19 SCL) match the ones already confirmed free
# on this board in garden-weather-sensor-waveshare.yaml: GPIO22/GPIO23 (the
# more common I2C default) are hardwired to the onboard WS2812 RGB LED
# (RGB_PWR / RGB_DATA) on this board, so I2C is moved to GPIO18/GPIO19
# instead - free, not strapping pins, not JTAG.

esphome:
  name: garden-light-sensor-ws
  friendly_name: Garden Light Sensor (Waveshare)

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

# --- WiFi ---
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

  ap:
    ssid: "Garden-Light-Fallback"
    password: !secret fallback_password

logger:
api:
  encryption:
    key: !secret api_encryption_key
ota:
  - platform: esphome
    password: !secret ota_password

button:
  - platform: restart
    name: "Garden Light Sensor Restart"

# --- I2C bus ---
i2c:
  sda: GPIO18
  scl: GPIO19
  scan: true

# --- BH1750: ambient light (lux) ---
sensor:
  - platform: bh1750
    address: 0x23      # tie BH1750 ADDR pin to GND (or leave floating) for this address; 0x5C if ADDR is tied to VCC
    name: "Garden Illuminance"
    update_interval: 60s

  - platform: wifi_signal
    name: "Garden Light Sensor WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Garden Light Sensor Uptime"
    update_interval: 60s
    entity_category: diagnostic
